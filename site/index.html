  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <!-- ============ HERO ============ -->\n  <section id=\"top\" style=\"position: relative;\">\n    <div style=\"position: absolute; inset: 0; background: radial-gradient(1100px 460px at 78% -8%, color-mix(in srgb, var(--accent,#2f6bff) 12%, transparent), transparent 70%);\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 1140px; margin: 0 auto; padding: 76px 24px 64px; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center;\">\n      <div>\n        <div style=\"display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e4e9f2; padding: 6px 13px 6px 8px; border-radius: 999px; font-size: 13px; color: #51607a; box-shadow: 0 2px 8px rgba(17,25,43,0.04);\">\n          <span style=\"display: inline-flex; align-items: center; gap: 6px; background: #e6f6ef; color: #1f9d6b; font-weight: 600; font-size: 11.5px; padding: 3px 9px; border-radius: 999px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#1f9d6b;\"><\u002Fspan>100% on-device<\u002Fspan>\n          Works on ChatGPT, Claude, Gemini, Perplexity &amp; Copilot\n        <\u002Fdiv>\n        <h1 style=\"font-size: clamp(36px, 4.4vw, 56px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; margin: 22px 0 0;\">Stop accidentally sending secrets to AI chatbots.<\u002Fh1>\n        <p style=\"font-size: 19px; color: #51607a; margin: 20px 0 0; max-width: 30em;\">AI Safety Guard scans your prompts and attachments <strong style=\"color:#11192b; font-weight:600;\">locally, before you hit send<\u002Fstrong> — and warns you the moment something sensitive slips in.<\u002Fp>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 13px; margin-top: 30px;\">\n          <a href=\"{{ ctaUrl }}\" style=\"display:inline-flex; align-items:center; gap:9px; background: var(--accent, #2f6bff); color: #fff; font-weight: 600; font-size: 16px; text-decoration: none; padding: 14px 24px; border-radius: 11px; box-shadow: 0 8px 22px color-mix(in srgb, var(--accent,#2f6bff) 34%, transparent);\">Add to Chrome — it's free<\u002Fa>\n          <a href=\"#how\" style=\"display:inline-flex; align-items:center; gap:8px; background: #fff; color: #11192b; font-weight: 600; font-size: 16px; text-decoration: none; padding: 14px 22px; border-radius: 11px; border: 1px solid #e4e9f2;\">See how it works<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 18px; margin-top: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: #8794a8; letter-spacing: -0.01em;\">\n          <span>No accounts<\u002Fspan><span style=\"color:#cdd5e2;\">/<\u002Fspan>\n          <span>No logging<\u002Fspan><span style=\"color:#cdd5e2;\">/<\u002Fspan>\n          <span>No network calls<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hero visual: actual pre-send warning screen -->\n      <div style=\"position: relative;\">\n        <div style=\"position:absolute; top:-20px; right: 6px; z-index: 3; display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #f1c7c2; color:#c0392b; font-weight:600; font-size:13px; padding:8px 13px; border-radius:999px; box-shadow:0 10px 30px rgba(17,25,43,0.12);\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#e0594f; box-shadow:0 0 0 4px #fdecea;\"><\u002Fspan>3 risks found\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #e4e9f2; border-radius: 18px; box-shadow: 0 30px 60px -24px rgba(17,25,43,0.30); padding: 22px 20px;\">\n          <img src=\"b4fc2401-8e57-4960-9265-097e9c8135f8\" alt=\"AI Safety Guard pre-send warning: detected an API key, account number and email address, all masked, with options to redact, send anyway, or keep editing.\" style=\"width: 100%; height: auto; display: block;\">\n        <\u002Fdiv>\n        <div style=\"margin-top:14px; display:flex; align-items:center; gap:9px; font-size:12.5px; color:#8794a8; justify-content:center;\">\n          <span style=\"width:6px;height:6px;border-radius:50%;background:#1f9d6b;\"><\u002Fspan>\n          Scanned on your device — nothing left the browser\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRIVATE BY DESIGN STRIP ============ -->\n  <section id=\"trust\" style=\"max-width: 1140px; margin: 0 auto; padding: 8px 24px 18px;\">\n    <div style=\"background: #0f1729; border-radius: 22px; padding: 38px 34px; color: #fff; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; inset:0; background: radial-gradient(700px 300px at 88% 120%, color-mix(in srgb, var(--accent,#2f6bff) 40%, transparent), transparent 70%); opacity:0.5;\"><\u002Fdiv>\n      <div style=\"position:relative; display:grid; grid-template-columns: 0.9fr 1.6fr; gap: 36px; align-items:center;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color: color-mix(in srgb, var(--accent,#2f6bff) 60%, #fff); letter-spacing:0.04em; text-transform:uppercase;\">// the whole point<\u002Fdiv>\n          <h2 style=\"font-size: 30px; line-height:1.1; letter-spacing:-0.025em; font-weight:800; margin: 12px 0 10px;\">Private by design.<\u002Fh2>\n          <p style=\"color:#9aa6bd; font-size:15px; margin:0;\">A tool that protects your secrets shouldn't become the thing collecting them. So it doesn't — at all.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;\">\n          <div style=\"background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:13px; padding:16px 14px;\"><div style=\"color:#1fd089; font-size:18px; font-weight:800;\">✓<\u002Fdiv><div style=\"font-size:13px; font-weight:600; margin-top:8px; line-height:1.25;\">Scans locally<\u002Fdiv><\u002Fdiv>\n          <div style=\"background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:13px; padding:16px 14px;\">< acing:-0.015em;\">Before using AI at work<\u002Fdiv>\n        <p style=\"color:#51607a; font-size:14.5px; margin: 10px 0 18px;\">Catch client names, internal plans, financials and legal or health info before they reach a chatbot.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">client data<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">financials<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">legal / health<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:16px; padding: 28px 26px;\">\n        <div style=\"font-weight:700; font-size:19px; letter-spacing:-0.015em;\">Before pasting code<\u002Fdiv>\n        <p style=\"color:#51607a; font-size:14.5px; margin: 10px 0 18px;\">Catch API keys, tokens, credentials and secrets hiding in stack traces, configs and snippets.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">api keys<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">tokens<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">credentials<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:16px; padding: 28px 26px;\">\n        <div style=\"font-weight:700; font-size:19px; letter-spacing:-0.015em;\">Before uploading documents<\u002Fdiv>\n        <p style=\"color:#51607a; font-size:14.5px; margin: 10px 0 18px;\">Scan PDFs and Word files locally — including the hidden comments and metadata you forgot were there.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">pdf / docx<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">comments<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#51607a; background:#f1f4f9; padding:4px 9px; border-radius:6px;\">metadata<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FEATURES ============ -->\n  <section id=\"features\" style=\"max-width: 1140px; margin: 0 auto; padding: 58px 24px 20px;\">\n    <div style=\"max-width: 40em; margin: 0 auto 40px; text-align:center;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#2f6bff); letter-spacing:0.06em; text-transform:uppercase;\">Features<\u002Fdiv>\n      <h2 style=\"font-size: clamp(28px, 3.4vw, 40px); line-height:1.08; letter-spacing:-0.03em; font-weight:800; margin: 12px 0 0;\">Calm protection that stays out of the way.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px;\">\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Local scanning<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Analyzed on your device, never stored or uploaded.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Pre-send warning<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Lists exactly what was found — masked values only.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Live risk badge<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">A small badge near the input updates as you type.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">One-click redaction<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Swaps secrets for labels like [EMAIL] and [API_KEY].<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Attachment scanning<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Reads PDF &amp; Word text locally, comments and metadata too.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Three sensitivity modes<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Basic, Balanced and Strict, switchable any time.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font-size:15.5px;\">Per-site control<\u002Fdiv><p style=\"color:#51607a; font-size:14px; margin:7px 0 0;\">Turn watching on or off per site; add custom domains.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px;\"><div style=\"font-weight:700; font- ay:grid; gap:14px;\">\n        <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 22px 24px;\">\n          <div style=\"font-weight:700; font-size:15.5px; margin-bottom:14px;\">Requested Chrome permissions<\u002Fdiv>\n          <div style=\"display:grid; gap:10px;\">\n            <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--accent,#2f6bff); min-width:118px;\">storage<\u002Fspan><span style=\"font-size:14px; color:#51607a;\">Save your settings &amp; the counter — on your device.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--accent,#2f6bff); min-width:118px;\">offscreen<\u002Fspan><span style=\"font-size:14px; color:#51607a;\">Run the bundled PDF text extractor locally. No requests.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--accent,#2f6bff); min-width:118px;\">host (AI sites)<\u002Fspan><span style=\"font-size:14px; color:#51607a;\">Only the AI tools you enable — never all sites.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px; padding-top:14px; border-top:1px solid #f1f4f9; font-size:13px; color:#8794a8;\">No access to browsing history, bookmarks, or downloads.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:14px;\">\n          <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 20px 22px;\">\n            <div style=\"font-weight:700; font-size:15.5px;\">How we verify \"no network calls\"<\u002Fdiv>\n            <p style=\"font-size:13.5px; color:#51607a; margin:8px 0 0;\">Open DevTools → Network while you type and send. You'll see the extension make zero requests.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:14px; padding: 20px 22px;\">\n            <div style=\"font-weight:700; font-size:15.5px;\">Version &amp; changelog<\u002Fdiv>\n            <p style=\"font-size:13.5px; color:#51607a; margin:8px 0 0;\"><span style=\"font-family:'IBM Plex Mono',monospace; color:#11192b;\">v1.0.0<\u002Fspan> — initial release. Release notes ship with every store update.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PERSONAS ============ -->\n  <section style=\"max-width: 1140px; margin: 0 auto; padding: 58px 24px 20px;\">\n    <div style=\"background:#fff; border:1px solid #e4e9f2; border-radius:20px; padding: 40px;\">\n      <h2 style=\"font-size: clamp(24px, 2.8vw, 32px); line-height:1.1; letter-spacing:-0.03em; font-weight:800; margin: 0 0 24px;\">Who should install this?<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns: repeat(2, 1fr); gap: 14px 40px;\">\n        <div style=\"display:flex; gap:13px; align-items:baseline; padding: 4px 0;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff); flex:none; transform:translateY(-2px);\"><\u002Fspan><span style=\"font-size:15.5px; color:#2a374e;\"><strong style=\"color:#11192b;\">Developers<\u002Fstrong> pasting stack traces, logs, configs or code.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:13px; align-items:baseline; padding: 4px 0;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff); flex:none; transform:translateY(-2px);\"><\u002Fspan><span style=\"font-size:15.5px; color:#2a374e;\"><strong style=\"color:#11192b;\">Consultants<\u002Fstrong> working with client documents.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:13px; align-items:baseline; padding: 4px 0;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff); flex:none; transform:translateY(-2px);\"><\u002Fspan><span style=\"font-size:15.5px; color:#2a374e;\"><strong style=\"color:#11192b;\">Employees<\u002Fstrong> using AI with internal company data.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:13px; align-items:baseline; padding: 4px 0;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent,#2f6bff); flex:none; transform:translateY(-2px);\"><\u002Fspan><span style=\"font-size:15.5px; color:#2a374e;\"><strong style=\"color:#11192b;\">Students &amp; researchers<\u002Fstrong> handling participant or unpublished work.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px; padding:18px 22px; background:#f7f9fc; border-radius:13px; border:1px dashed #d4dce8; font-size:16px; font-weight:600; color:#11192b;\">…and anyone who has ever pasted first and panicked afterward.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FREE GUIDE (lead magnet, supporting) ============ -->\n  <section id=\"guide\" style=\"max-width: 1140px; margin: 0 auto; padding: 58px 24px 20px;\">\n    <div style=\"background: linear-gradient(135deg, color-mix(in srgb, var(--accent,#2f6bff) 9%, #fff), #fff); border:1px solid #e4e9f2; border-radius:20px; padding: 36px; display:grid; grid-template-columns: 0.95fr 1.05fr; gap:36px; align-items:center;\">\n      <div>\n        <div style=\"display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--accent,#2f6bff); background: color-mix(in srgb, var(--accent,#2f6bff) 12%, #fff); padding:4px 10px; border-radius:999px; letter-spacing:0.03em;\">FREE BONUS<\u002Fdiv>\n        <h2 style=\"font-size: clamp(24px, 2.8vw, 32px); line-height:1.12; letter-spacing:-0.03em; font-weight:800; margin: 14px 0 10px;\">The one-page guide: what you should never type into an AI chatbot.<\u002Fh2>\n        <p style=\"color:#51607a; font-size:15px; margin:0 0 20px;\">Five
