name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate tokens (single source)
        run: npm run gen:tokens

      - name: Lint (eslint + stylelint token gate)
        run: npm run lint

      - name: Unit tests (detector + UI + storage/settings)
        run: npm test

      - name: Privacy audit
        run: npm run audit:privacy

      - name: Dependency vulnerability audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Performance benchmark
        run: npm run bench

      - name: Build
        run: npm run build
