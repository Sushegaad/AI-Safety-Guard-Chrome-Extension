<!DOCTYPE html>
<!-- Snapshot of the ChatGPT composer DOM (primary selectors from src/shared/sites.js). -->
<html><head><title>ChatGPT fixture</title></head><body>
  <main>
    <form>
      <div id="prompt-textarea" contenteditable="true" style="width:600px;height:80px;border:1px solid #ccc"></div>
      <button data-testid="send-button" aria-label="Send prompt" type="button">Send</button>
    </form>
  </main>
  <script>
    window.__sent = false;
    document.querySelector('[data-testid="send-button"]').addEventListener('click', () => { window.__sent = true; });
    document.querySelector('form').addEventListener('submit', (e) => { e.preventDefault(); window.__sent = true; });
  </script>
</body></html>
