<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome to AI Safety Guard</title>
  <link rel="stylesheet" href="../shared/fonts.css" />
  <link rel="stylesheet" href="../shared/tokens.css" />
  <style>
    /* Screen E — onboarding. Tokens only (var(--…)); paper bg, Hanken Grotesk. */
    body.asg-root {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-paper);
    }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      width: 440px;
      max-width: 92vw;
      box-shadow: var(--shadow-modal);
    }
    /* Step 1 branded hero banner (bleeds to the card edges). */
    .hero {
      margin: calc(-1 * var(--space-5)) calc(-1 * var(--space-5)) var(--space-4);
      padding: var(--space-5) var(--space-4);
      background: var(--color-trust-soft);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      text-align: center;
    }
    .hero__mark { width: 56px; height: 56px; margin: 0 auto var(--space-2); }
    .hero__name { font-weight: var(--weight-medium); font-size: var(--text-lg); color: var(--color-ink); }
    .step-meta { color: var(--color-muted); font-size: var(--text-xs); letter-spacing: .04em; }
    h1 { font-weight: var(--weight-medium); font-size: var(--text-xl); margin: var(--space-2) 0 var(--space-2); }
    .sub { color: var(--color-muted); font-size: var(--text-md); margin: 0 0 var(--space-4); }
    .benefit { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-md); margin: var(--space-2) 0; }
    .benefit .tick { color: var(--color-trust); font-weight: var(--weight-medium); }
    .opt-card {
      border: 1px solid var(--color-border); border-radius: var(--radius-md);
      padding: var(--space-3); margin-bottom: var(--space-2); cursor: pointer;
    }
    .opt-card--selected { border-color: var(--color-trust); background: var(--color-trust-soft); }
    .opt-card__name { font-weight: var(--weight-medium); font-size: var(--text-md); }
    .opt-card__rec { color: var(--color-trust); font-size: var(--text-xs); font-weight: var(--weight-medium); text-transform: uppercase; letter-spacing: .05em; margin-left: var(--space-2); }
    .opt-card__desc { color: var(--color-muted); font-size: var(--text-sm); margin-top: 2px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-2) 0; }
    .toggle-row__label { font-size: var(--text-md); }
    .switch { appearance: none; -webkit-appearance: none; width: 36px; height: 20px; border-radius: var(--radius-pill); background: var(--color-border); position: relative; cursor: pointer; }
    .switch:checked { background: var(--color-trust); }
    .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: var(--radius-pill); background: var(--color-surface); transition: transform .12s ease; }
    .switch:checked::after { transform: translateX(16px); }
    .domain-input { width: 100%; box-sizing: border-box; font-family: var(--font-ui); font-size: var(--text-sm); color: var(--color-ink); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 8px; margin-top: var(--space-2); }
    .cta { margin-top: var(--space-4); }
    .asg-btn { width: 100%; }
  </style>
</head>
<body class="asg-root">
  <div class="card" id="onboarding"></div>
  <script src="onboarding.js"></script>
</body>
</html>
